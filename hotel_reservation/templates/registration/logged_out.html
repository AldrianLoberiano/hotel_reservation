{% extends 'base.html' %}

{% block title %}Logged Out | StaySmart{% endblock %}

{% block content %}
<div class="auth-card text-center">
    <div style="font-size:3.5rem;margin-bottom:1rem;">
        <span style="background:linear-gradient(135deg,#d1fae5,#a7f3d0);width:80px;height:80px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;">
            <i class="bi bi-check-lg text-success" style="font-size:2rem;"></i>
        </span>
    </div>
    <h1 class="h4 fw-bold mb-2">You've Been Logged Out</h1>
    <p class="text-muted small mb-4">Thanks for visiting StaySmart. We hope to see you again soon!</p>
    <a class="btn btn-primary w-100 mb-2" href="{% url 'login' %}">
        <i class="bi bi-box-arrow-in-right me-1"></i>Sign In Again
    </a>
    <a class="btn btn-outline-primary w-100" href="{% url 'room_list' %}">
        <i class="bi bi-door-open me-1"></i>Browse Rooms
    </a>
</div>
{% endblock %}
