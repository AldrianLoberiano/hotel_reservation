{% extends 'base.html' %}

{% block title %}Availability Calendar | CozyStay{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <div>
        <h1 class="h3 mb-0 fw-bold"><i class="bi bi-calendar3 me-2"></i>Availability Calendar</h1>
        <p class="text-muted small mb-0">View all pending and confirmed bookings at a glance</p>
    </div>
    <a href="{% url 'room_list' %}" class="btn btn-outline-primary">
        <i class="bi bi-arrow-left me-1"></i>Back to Rooms
    </a>
</div>

<!-- Legend -->
<div class="d-flex gap-3 mb-3 flex-wrap">
    <span class="d-flex align-items-center gap-1 small">
        <span style="width:12px;height:12px;border-radius:50%;background:#16a34a;display:inline-block;"></span>
        <span class="text-muted">Confirmed</span>
    </span>
    <span class="d-flex align-items-center gap-1 small">
        <span style="width:12px;height:12px;border-radius:50%;background:#f59e0b;display:inline-block;"></span>
        <span class="text-muted">Pending</span>
    </span>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-3 p-md-4">
        <div id="calendar"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const calendarEl = document.getElementById("calendar");
        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: "dayGridMonth",
            height: 680,
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,listMonth'
            },
            events: "{% url 'availability_events' %}",
            eventDisplay: 'block',
            dayMaxEvents: 3,
        });
        calendar.render();
    });
</script>
{% endblock %}
