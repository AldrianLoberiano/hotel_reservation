{% extends 'base.html' %}

{% block title %}Delete Room | CozyStay Admin{% endblock %}

{% block content %}
<div class="d-flex justify-content-center">
    <div class="card border-0 shadow-sm" style="max-width:500px;width:100%;">
        <div class="card-body p-4 text-center">
            <div style="width:64px;height:64px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:1.75rem;color:#ef4444;">
                <i class="bi bi-trash3-fill"></i>
            </div>
            <h1 class="h5 fw-bold mb-2">Delete Room</h1>
            <p class="text-muted mb-1">You are about to permanently delete:</p>
            <p class="fw-bold fs-6 mb-4">"{{ room.name }}"</p>
            <p class="small text-danger bg-danger bg-opacity-10 rounded-2 p-2 mb-4">
                <i class="bi bi-exclamation-triangle-fill me-1"></i>This action cannot be undone. All related bookings may also be affected.
            </p>
            <form method="post" class="d-flex gap-2">
                {% csrf_token %}
                <button class="btn btn-danger flex-grow-1" type="submit">
                    <i class="bi bi-trash me-1"></i>Yes, Delete
                </button>
                <a class="btn btn-outline-secondary flex-grow-1" href="{% url 'admin_room_list' %}">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
